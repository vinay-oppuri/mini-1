<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="560" viewBox="0 0 1900 560">
  <defs>
    <style>
      .box { fill: #f6f8fa; stroke: #222; stroke-width: 2; rx: 12; ry: 12; }
      .text { font-family: Arial, sans-serif; font-size: 20px; fill: #111; }
      .arrow { stroke: #333; stroke-width: 3; fill: none; marker-end: url(#m); }
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: bold; fill: #111; }
      .sub { font-family: Arial, sans-serif; font-size: 18px; fill: #333; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#333" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1900" height="560" fill="#ffffff" />
  <text x="40" y="50" class="title">Multi-Agent Workflow</text>
  <text x="40" y="82" class="sub">Input -&gt; Log Processing -&gt; Detection -&gt; Explanation -&gt; Policy -&gt; Response</text>

  <rect class="box" x="40" y="170" width="190" height="90" />
  <text class="text" x="80" y="223">Input Logs</text>

  <rect class="box" x="280" y="170" width="190" height="90" />
  <text class="text" x="338" y="223">main.py</text>

  <rect class="box" x="520" y="170" width="230" height="90" />
  <text class="text" x="556" y="223">Coordinator.run</text>

  <rect class="box" x="810" y="170" width="200" height="90" />
  <text class="text" x="848" y="223">LogAgent</text>

  <rect class="box" x="1060" y="170" width="220" height="90" />
  <text class="text" x="1090" y="223">AnalysisAgent</text>

  <rect class="box" x="1340" y="170" width="290" height="90" />
  <text class="text" x="1372" y="223">LLMExplanationAgent</text>

  <rect class="box" x="40" y="340" width="220" height="90" />
  <text class="text" x="84" y="393">PolicyAgent</text>

  <rect class="box" x="320" y="340" width="240" height="90" />
  <text class="text" x="360" y="393">ResponseAgent</text>

  <rect class="box" x="620" y="340" width="260" height="90" />
  <text class="text" x="653" y="393">Final Output</text>

  <line class="arrow" x1="230" y1="215" x2="280" y2="215" />
  <line class="arrow" x1="470" y1="215" x2="520" y2="215" />
  <line class="arrow" x1="750" y1="215" x2="810" y2="215" />
  <line class="arrow" x1="1010" y1="215" x2="1060" y2="215" />
  <line class="arrow" x1="1280" y1="215" x2="1340" y2="215" />

  <path class="arrow" d="M1485 260 L1485 310 L150 310 L150 340" />
  <line class="arrow" x1="260" y1="385" x2="320" y2="385" />
  <line class="arrow" x1="560" y1="385" x2="620" y2="385" />

  <text class="sub" x="1065" y="320">AnalysisAgent internals:</text>
  <text class="sub" x="1065" y="345">DrainParser + InferencePipeline + Heuristic score</text>
